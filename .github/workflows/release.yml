name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset_name: jzen-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset_name: jzen-linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset_name: jzen-macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset_name: jzen-macos-aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset_name: jzen-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/jzen ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item target\${{ matrix.target }}\release\jzen.exe ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Install cargo-deb
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-deb

      - name: Build deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo deb --output ./artifacts/

      - name: Install cargo-generate-rpm
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-generate-rpm

      - name: Build rpm package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo generate-rpm --output ./artifacts/

      - name: Upload package artifacts
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.asset_name }}
          path: artifacts/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "jzen-*" -o -name "*.deb" -o -name "*.rpm" \) -exec mv {} release-assets/ \;
          cp install.sh release-assets/

      - name: Generate shell completions
        run: |
          chmod +x release-assets/jzen-linux-x86_64
          mkdir -p completions
          release-assets/jzen-linux-x86_64 completions bash > completions/jzen.bash
          release-assets/jzen-linux-x86_64 completions zsh > completions/jzen.zsh
          release-assets/jzen-linux-x86_64 completions fish > completions/jzen.fish
          tar -czvf release-assets/completions.tar.gz -C completions .

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
